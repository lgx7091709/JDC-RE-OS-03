name: Build OpenWrt Henry custom

permissions:
  contents: write
  actions: write

on:
  #push:
    #branches:
      #- development-version
  workflow_dispatch:

env:
  REMOTE_REPOSITORY: Super-Henry/openwrt
  REMOTE_BRANCH: development-version
  CONFIG_FILE: re-cs-03.config
  CUSTOM_FILES_PATH: files/
  RELEASE_PREFIX: development-version
  ENV: development-version
  NSS_PACKAGES_REPOSITORY: Super-Henry/NSS-PACKAGES
  NSS_PACKAGES_REPOSITORY_BRANCH: NSS-12.5-K6.x

jobs:
  check_commits:
    name: Check for new commits
    runs-on: ubuntu-24.04
    outputs:
      new_commits: ${{ steps.check_commits.outputs.new_commits }}
      latest_commit_sha: ${{ steps.check_commits.outputs.latest_commit_sha }}
      nss_packages_repo_new_commits: ${{ steps.check_commits.outputs.nss_packages_repo_new_commits }}
      nss_packages_repo_latest_commit_sha: ${{ steps.check_commits.outputs.nss_packages_repo_latest_commit_sha }}
    steps:
      - name: Check for new commits in both repositories
        id: check_commits
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest_sha=$(gh api "repos/${{ env.REMOTE_REPOSITORY }}/commits/${{ env.REMOTE_BRANCH }}" --jq .sha)
          packages_sha=$(gh api "repos/${{ env.NSS_PACKAGES_REPOSITORY }}/commits/${{ env.NSS_PACKAGES_REPOSITORY_BRANCH }}" --jq .sha)
          release_body=$(gh api "repos/${{ github.repository }}/releases/latest" --jq .body 2>/dev/null || echo "")

          new_commits=$([[ "$release_body" == *"$latest_sha"* ]] && echo "false" || echo "true")
          nss_new_commits=$([[ "$release_body" == *"$packages_sha"* ]] && echo "false" || echo "true")

          echo "new_commits=$new_commits" >> "$GITHUB_OUTPUT"
          echo "latest_commit_sha=$latest_sha" >> "$GITHUB_OUTPUT"
          echo "nss_packages_repo_new_commits=$nss_new_commits" >> "$GITHUB_OUTPUT"
          echo "nss_packages_repo_latest_commit_sha=$packages_sha" >> "$GITHUB_OUTPUT"

  build:
    name: Build OpenWrt
    needs: check_commits
    if: github.event_name == 'workflow_dispatch' || needs.check_commits.outputs.new_commits == 'true' || needs.check_commits.outputs.nss_packages_repo_new_commits == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Install dependencies
        run: sudo apt update && sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Checkout remote repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REMOTE_REPOSITORY }}
          ref: ${{ env.REMOTE_BRANCH }}

      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          path: "builder_repo"

      - name: Add custom patches
        run: |
          df -hT
          if [ -d "builder_repo/patches" ] && [ "$(ls -A builder_repo/patches 2>/dev/null)" ]; then
            for patch in builder_repo/patches/*.patch; do
              echo "Applying patch $patch ..."
              ls -al "$patch" && sha256sum "$patch"
              [ -f "$patch" ] && git apply --verbose "$patch"
            done
          fi
            
      - name: Update and install feeds
        run: |
          df -h
          #echo 'src-git custom https://github.com/kiddin9/kwrt-packages' >> feeds.conf.default
          git clone https://github.com/Openwrt-Passwall/openwrt-passwall2.git package/feeds/luci/luci-app-passwall2
          git clone https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git package/utils/passwall2
          git clone https://github.com/jerrykuku/luci-theme-argon.git package/feeds/luci/luci-theme-argon
          git clone https://github.com/jerrykuku/luci-app-argon-config.git package/feeds/luci/luci-app-argon-config
          git clone https://github.com/Super-Henry/OpenClash.git package/luci-app-openclash

          # 🔥 加入蒲公英 VPN (OpenOray) - 包含蒲公英、花生壳、向日葵
          git clone https://github.com/Super-Henry/OpenOray.git package/OpenOray
          
          # 检查克隆是否成功
          if [ -d "package/OpenOray" ]; then
            echo "✅ OpenOray 仓库克隆成功"
          else
            echo "❌ OpenOray 仓库克隆失败"
            exit 1
          fi
          
          # === 处理蒲公英 (pgyvpn) ===
          if [ -f "package/OpenOray/pgyvpn/Makefile" ]; then
            sed -i 's/+libopenssl-1.1/+libopenssl1.1/g' package/OpenOray/pgyvpn/Makefile
            sed -i 's/+libopenssl\b/+libopenssl1.1/g' package/OpenOray/pgyvpn/Makefile
            sed -i '/+libopenssl3/d' package/OpenOray/pgyvpn/Makefile
            echo "✅ pgyvpn Makefile 已强制使用 OpenSSL 1.1"
          fi


          # 修复 luci-app-pgyvpn 的 Makefile
          if [ -f "package/OpenOray/luci-app-pgyvpn/Makefile" ]; then
            sed -i 's/+luci-lib-ipkg//g' package/OpenOray/luci-app-pgyvpn/Makefile
            sed -i 's/+luci-lua//g' package/OpenOray/luci-app-pgyvpn/Makefile
            sed -i 's/+lua//g' package/OpenOray/luci-app-pgyvpn/Makefile
            sed -i 's/+luci-compat/+luci-base/g' package/OpenOray/luci-app-pgyvpn/Makefile
            sed -i 's/+libopenssl-1.1/+libopenssl1.1/g' package/OpenOray/luci-app-pgyvpn/Makefile
            sed -i 's/+libopenssl\b/+libopenssl1.1/g' package/OpenOray/luci-app-pgyvpn/Makefile
            echo "✅ luci-app-pgyvpn Makefile 已修复"
          fi

          # === 处理花生壳 (phtunnel) ===
          if [ -f "package/OpenOray/phtunnel/Makefile" ]; then
            sed -i 's/+libopenssl-1.1/+libopenssl1.1/g' package/OpenOray/phtunnel/Makefile
            sed -i 's/+libopenssl\b/+libopenssl1.1/g' package/OpenOray/phtunnel/Makefile
            sed -i '/+libopenssl3/d' package/OpenOray/phtunnel/Makefile
            echo "✅ phtunnel Makefile 已强制使用 OpenSSL 1.1"
          fi

          # 修复 luci-app-phtunnel 的 Makefile
          if [ -f "package/OpenOray/luci-app-phtunnel/Makefile" ]; then
            sed -i 's/+luci-lib-ipkg//g' package/OpenOray/luci-app-phtunnel/Makefile
            sed -i 's/+luci-lua//g' package/OpenOray/luci-app-phtunnel/Makefile
            sed -i 's/+lua//g' package/OpenOray/luci-app-phtunnel/Makefile
            sed -i 's/+luci-compat/+luci-base/g' package/OpenOray/luci-app-phtunnel/Makefile
            sed -i 's/+libopenssl-1.1/+libopenssl1.1/g' package/OpenOray/luci-app-phtunnel/Makefile
            sed -i 's/+libopenssl\b/+libopenssl1.1/g' package/OpenOray/luci-app-phtunnel/Makefile
            echo "✅ luci-app-phtunnel Makefile 已修复"
          fi

          # 解压自定义插件到 package/ 独立目录（避免被 feeds 清理）
          unzip builder_repo/luci-app-accesscontrol.zip -d package/luci-app-accesscontrol

          # 更新 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a -p luci
          ./scripts/feeds install -a -p packages

      # ========== 验证 OpenSSL 1.1 Makefile ==========
      - name: Verify OpenSSL 1.1 Makefile
        run: |
          MAKEFILE_PATH="package/libs/openssl1.1/Makefile"
          if [ -f "$MAKEFILE_PATH" ]; then
            echo "=== OpenSSL 1.1 Makefile settings ==="
            grep -E "PKG_NAME|PKG_VERSION|PKG_SOURCE[^_]|PKG_SOURCE_SUBDIR|OPENSSL_SRC_DIR" "$MAKEFILE_PATH" || true
            echo ""
            echo "=== Checking for nested directory handling ==="
            if grep -q "openssl-\$(PKG_VERSION)/openssl-\$(PKG_VERSION)" "$MAKEFILE_PATH"; then
              echo "✅ Makefile has nested directory support"
            else
              echo "⚠️ Makefile may not have nested directory support"
            fi
          else
            echo "❌ Makefile not found at $MAKEFILE_PATH"
            exit 1
          fi

      - name: Setup configuration and custom files
        run: |
          df -hT
          
          # 🔥 修复内核版本不匹配：强制清理旧缓存（关键修复）
          rm -rf tmp build_dir staging_dir
          
          mv builder_repo/${{ env.CONFIG_FILE }} .config
          
          # 关键：强制扫描所有本地包
          make package/symlinks
          
          # 先运行 defconfig 生成基础配置
          make defconfig -j$(nproc)
          
          # 强制加入 libopenssl1.1 的配置（确保包被识别）
          echo "CONFIG_PACKAGE_libopenssl1.1=y" >> .config

          # ==============================================
          # 全局修复 pre-install 脚本报错 / ubus/service缺失
          # ==============================================
          echo "CONFIG_PACKAGE_procd=y" >> .config
          echo "CONFIG_PACKAGE_ubus=y" >> .config
          echo "CONFIG_PACKAGE_ubusd=y" >> .config
          echo "CONFIG_PACKAGE_service=y" >> .config
          echo "CONFIG_PACKAGE_openwrt-release=y" >> .config
          echo "CONFIG_TARGET_PERMISSION_SET=y" >> .config
          echo "CONFIG_PACKAGE_blockd=y" >> .config
          echo "CONFIG_PACKAGE_lsblk=y" >> .config
          echo "CONFIG_PACKAGE_dmidecode=y" >> .config
          
          # 运行 oldconfig 接受新选项
          make oldconfig
          
          # 然后添加其他插件配置
          echo "CONFIG_USE_APK=y" >> .config
          echo "CONFIG_PACKAGE_luci-theme-argon=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-argon-config=y" >> .config

          echo "CONFIG_PACKAGE_luci-app-openclash=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-passwall2=y" >> .config
          # 🔥 使用本地 IPQ5018 专用蒲公英

          echo "CONFIG_PACKAGE_pgyvpn=m" >> .config
          echo "CONFIG_PACKAGE_pgyvpn-ipq5018=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-pgyvpn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-pgyvpn-zh-cn=y" >> .config
          # 花生壳
          echo "CONFIG_PACKAGE_phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-phtunnel=y" >> .config

          echo "CONFIG_PACKAGE_luci-compat=y" >> .config
          echo "CONFIG_PACKAGE_luci-base=y" >> .config

          echo "" >> .config
          echo "# OpenClash 依赖（OpenSSL 3.0）" >> .config
          echo "CONFIG_PACKAGE_openssl=y" >> .config
          echo "CONFIG_PACKAGE_coreutils=y" >> .config
          echo "CONFIG_PACKAGE_coreutils-nohup=y" >> .config
          echo "CONFIG_PACKAGE_bash=y" >> .config
          echo "CONFIG_PACKAGE_jsonfilter=y" >> .config
          echo "CONFIG_PACKAGE_ca-certificates=y" >> .config

          echo "" >> .config
          echo "# PassWall2 全部组件（OpenSSL 3.0）" >> .config
          echo "CONFIG_PACKAGE_passwall2=y" >> .config
          echo "CONFIG_PACKAGE_xray-core=y" >> .config
          echo "CONFIG_PACKAGE_xray-plugin=y" >> .config
          echo "CONFIG_PACKAGE_sing-box=y" >> .config
          echo "CONFIG_PACKAGE_hysteria=y" >> .config
          echo "CONFIG_PACKAGE_naiveproxy=y" >> .config
          echo "CONFIG_PACKAGE_tuic-client=y" >> .config
          echo "CONFIG_PACKAGE_shadowsocks-libev-ss-redir=y" >> .config
          echo "CONFIG_PACKAGE_shadowsocks-libev-ss-tunnel=y" >> .config
          echo "CONFIG_PACKAGE_shadowsocksr-libev-ssr-redir=y" >> .config

          echo "" >> .config
          echo "# 必须集成内核模块" >> .config
          echo "CONFIG_PACKAGE_kmod-tun=y" >> .config
          echo "CONFIG_PACKAGE_kmod-inet-diag=y" >> .config
          echo "CONFIG_PACKAGE_kmod-nf-tproxy=y" >> .config
          echo "CONFIG_PACKAGE_kmod-ipt-tproxy=y" >> .config

          echo "" >> .config
          echo "# 必要工具" >> .config
          echo "CONFIG_PACKAGE_iptables=y" >> .config
          echo "CONFIG_PACKAGE_iptables-mod-tproxy=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          echo "CONFIG_PACKAGE_unzip=y" >> .config
          echo "CONFIG_PACKAGE_ca-bundle=y" >> .config

          echo "" >> .config
          echo "# 辅助组件" >> .config
          echo "CONFIG_PACKAGE_ipset=y" >> .config
          echo "CONFIG_PACKAGE_libcap=y" >> .config
          echo "CONFIG_PACKAGE_libstdcpp=y" >> .config   # 花生壳可能需要

          echo "" >> .config
          echo "# DNS 配置" >> .config
          echo "CONFIG_PACKAGE_dnsmasq-full=y" >> .config
          echo "CONFIG_PACKAGE_dnsmasq=n" >> .config

          echo "" >> .config
          echo "# WEB挂载点" >> .config
          echo "CONFIG_PACKAGE_luci-mod-system=y" >> .config
          echo "CONFIG_PACKAGE_luci-mod-system-mountpoints=y" >> .config
          echo "CONFIG_PACKAGE_block-mount=y" >> .config

          # 最后再运行一次 defconfig 确保依赖正确
          make defconfig -j$(nproc)
          
          mkdir -p ${{ env.CUSTOM_FILES_PATH }}
          [ -d "builder_repo/${{ env.CUSTOM_FILES_PATH }}" ] && cp -r builder_repo/${{ env.CUSTOM_FILES_PATH }}. ${{ env.CUSTOM_FILES_PATH }} || true

      # ========== ✅ 自动注入真实编译时间（你要的核心功能） ==========
      - name: Inject real build timestamp
        run: |
          BUILD_DATE=$(date +%s)
          BUILD_DATE_FRIENDLY=$(date +"%Y-%m-%d %H:%M:%S")
          echo "BUILD_DATE=\"$BUILD_DATE\"" >> package/base-files/files/etc/os-release
          mkdir -p files/etc
          echo "固件编译时间: $BUILD_DATE_FRIENDLY" > files/etc/build_time
          echo "编译源码提交: ${{ needs.check_commits.outputs.latest_commit_sha }}" >> files/etc/build_time

      - name: Use /mnt for more disk space
        if: always()
        run: |
          sudo mkdir -p /mnt/upper /mnt/work && sudo chmod a+w /mnt/upper
          sudo mount -t overlay -olowerdir=$(pwd),upperdir=/mnt/upper,workdir=/mnt/work overlay $(pwd) && df -hT

      # 👇👇👇 这里已注释，禁止恢复旧缓存（防止内核错乱）
      # - name: Restore cache from previous build
      #   uses: actions/cache@v4
      #   if: always()
      #   with:
      #     key: openwrt-build-${{ needs.check_commits.outputs.latest_commit_sha }}
      #     restore-keys: |
      #       openwrt-build
      #     path: |
      #       build_dir
      #       dl
      #       staging_dir
      #       tmp

      # 👇👇👇 这里已注释，不清理云端缓存（防止内核错乱）
      # - name: Clean up old caches
      #   env:
      #     GH_TOKEN: ${{ github.token }}
      #   run: |
      #     gh api repos/${{ github.repository }}/actions/caches --paginate --jq '.actions_caches[0:] | .[] |.key' | while read key; do
      #       echo "Removing old cache $key ..."
      #       gh api -X DELETE "/repos/${{ github.repository }}/actions/caches?key=$key" 2>/dev/null || true
      #     done

      # ========== 清理 OpenSSL 1.1 构建目录 ==========
      - name: Clean OpenSSL 1.1 build dirs
        run: |
          echo "🧹 Cleaning OpenSSL 1.1 build directories..."
          rm -rf build_dir/target-*/openssl*
          rm -rf build_dir/host/openssl*
          echo "✅ OpenSSL 1.1 build dirs cleaned"

      - name: Download packages
        run: |
          df -hT
          ./scripts/feeds update -a
          make download -j$(nproc) V=s
          
      - name: Build firmware
        env: 
          CMAKE_POLICY_VERSION_MINIMUM: 3.5
        run: |
          df -hT
          make check -j$(nproc) FIXUP=1 V=s
          make -j$(nproc) || make -j1 V=s  # Retry single-threaded on failure
          tar cvzf bin/targets/qualcommax/ipq50xx/snapshots.tar.gz -C bin packages/aarch64_cortex-a53 targets/qualcommax/ipq50xx/packages

      - name: Verify packages in firmware
        run: |
          echo "=== 验证包是否被编译 ==="
          echo "检查 OpenClash 相关包..."
          find bin/ -name "*.ipk" | grep -E "(openclash)" || echo "⚠️ 未找到 OpenClash 包"
          echo ""
          echo "检查 PassWall 相关包..."
          find bin/ -name "*.ipk" | grep -E "(passwall)" || echo "⚠️ 未找到 PassWall 包"
          echo ""
          echo "检查 Argon 主题相关包..."
          find bin/ -name "*.ipk" | grep -E "(argon)" || echo "⚠️ 未找到 Argon 主题包"
          echo ""
          echo "检查 OpenSSL 1.1 库..."
          find bin/ -name "*.ipk" | grep -E "(libopenssl1.1)" || echo "⚠️ 未找到 libopenssl1.1"
          echo ""
          echo "检查 蒲公英 VPN 包..."
          find bin/ -name "pgyvpn-ipq5018*"
          echo "检查 蒲公英 Web 包..."
          find bin/ -name "luci-app-pgyvpn*"
          find bin/ -name "luci-i18n-pgyvpn*"
          echo "=== 验证完成 ==="

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipq50xx-images
          path: bin/targets/qualcommax/ipq50xx

      - name: Check disk space usage
        if: always()
        run: df -hT

  release:
    name: Create release
    needs: [check_commits, build]
    if: needs.build.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ipq50xx-images
          path: firmware
      - name: Set release date
        run: echo "RELEASE_DATE=$(date +%F)" >> $GITHUB_ENV
      - name: Publish release
        uses: softprops/action-gh-release@master
        with:
          files: firmware/*
          tag_name: ${{ env.RELEASE_PREFIX }}-${{ env.RELEASE_DATE }}
          name: 🚀 OpenWrt Build Release ${{ env.RELEASE_DATE }}
          body: |
            ## 📦 OpenWrt Automated Build Release

            **Build Date:** ${{ env.RELEASE_DATE }}

            ### 🔄 Main Repository
            **Repository:** [${{ env.REMOTE_REPOSITORY }}](https://github.com/${{ env.REMOTE_REPOSITORY }})
            **Branch:** `${{ env.REMOTE_BRANCH }}`
            **Commit:** `${{ needs.check_commits.outputs.latest_commit_sha }}`

            ### 📦 NSS Packages
            **Repository:** [${{ env.NSS_PACKAGES_REPOSITORY }}](https://github.com/${{ env.NSS_PACKAGES_REPOSITORY }})
            **Branch:** `${{ env.NSS_PACKAGES_REPOSITORY_BRANCH }}`
            **Commit:** `${{ needs.check_commits.outputs.nss_packages_repo_latest_commit_sha }}`

            ### 📝 Build Information
            - **Target:** [JDCloud RE-CS-03 后羿/哪吒]
            - **蒲公英 VPN Web 面板已修复 ✅**
            - **Configuration:** [`${{ env.CONFIG_FILE }}`](${{ env.CONFIG_FILE }})

            ### 📦 插件说明
            - 蒲公英 VPN **pgyvpn-ipq5018** (本地aarch64版 ✅)
            - 蒲公英 Web 面板 luci-app-pgyvpn ✅
            - 花生壳 phtunnel (OpenSSL 1.1) ✅

            ### 📋 Notes
            - Automated build triggered by ${{ github.event_name }}
            - Previous releases are automatically cleaned up (keeping latest 5)
            ---
            _Generated by GitHub Actions 🤖_

      - name: Clean up old releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          df -hT
          gh api repos/${{ github.repository }}/releases --paginate --jq '.[5:10] | .[] | "\(.id) \(.tag_name)"' | while read id tag; do
            day=$(echo "$tag" |cut -d'-' -f4)
            if [ $day -ne "02" ] && [ $day -ne "09" ] && [ $day -ne "16" ] && [ $day -ne "24" ]; then
              echo "Removing old release $tag ..."
              gh api -X DELETE "repos/${{ github.repository }}/releases/$id" && gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/$tag" 2>/dev/null || true
            fi
          done
